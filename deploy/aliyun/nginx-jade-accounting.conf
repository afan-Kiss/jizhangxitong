# 和田玉镯子记账 — 内网 4732（/account 子路径，供 80 端口反代）
server {
    listen 4732;
    server_name 127.0.0.1;

    client_max_body_size 50m;

    location /account/api/ {
        proxy_pass http://127.0.0.1:4731/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /account/ws/worker {
        proxy_pass http://127.0.0.1:4731/ws/worker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /account/assets/ {
        alias /www/wwwroot/jade-accounting/web/assets/;
        expires 7d;
    }

    location /account/ {
        rewrite ^/account/?(.*)$ /$1 break;
        root /www/wwwroot/jade-accounting/web;
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/jade-accounting.access.log;
    error_log /www/wwwlogs/jade-accounting.error.log;
}

# 子域名（DNS 配置 account.xiangyuzhubao.xyz 后可用）
server {
    listen 80;
    server_name account.xiangyuzhubao.xyz;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://127.0.0.1:4731/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/worker {
        proxy_pass http://127.0.0.1:4731/ws/worker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /assets/ {
        alias /www/wwwroot/jade-accounting/web/assets/;
        expires 7d;
    }

    location / {
        root /www/wwwroot/jade-accounting/web;
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/jade-accounting-subdomain.access.log;
    error_log /www/wwwlogs/jade-accounting-subdomain.error.log;
}
